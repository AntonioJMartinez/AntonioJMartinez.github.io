    <script>
        (function() {
            const DEFAULT_CARD_THEME = {
                primary: [120, 119, 198],
                secondary: [248, 249, 252],
                accent: [255, 255, 255]
            };

            function clampChannel(value) {
                return Math.max(0, Math.min(255, Math.round(value)));
            }

            function mixColors(colorA, colorB, weight = 0.5) {
                return colorA.map((channel, index) =>
                    clampChannel(channel * (1 - weight) + colorB[index] * weight)
                );
            }

            function rgbToCss(color) {
                return color.map(clampChannel).join(', ');
            }

            function rgbToHsl([r, g, b]) {
                const red = r / 255;
                const green = g / 255;
                const blue = b / 255;
                const max = Math.max(red, green, blue);
                const min = Math.min(red, green, blue);
                const lightness = (max + min) / 2;

                if (max === min) {
                    return { s: 0, l: lightness };
                }

                const delta = max - min;
                const saturation = lightness > 0.5
                    ? delta / (2 - max - min)
                    : delta / (max + min);

                return { s: saturation, l: lightness };
            }

            function extractThemeFromImages(images) {
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d', { willReadFrequently: true });

                if (!context || images.length === 0) {
                    return DEFAULT_CARD_THEME;
                }

                const sampleSize = 24;
                canvas.width = sampleSize;
                canvas.height = sampleSize;

                const average = [0, 0, 0];
                const vibrant = [0, 0, 0];
                let averageWeight = 0;
                let vibrantWeight = 0;

                images.forEach((image) => {
                    try {
                        context.clearRect(0, 0, sampleSize, sampleSize);
                        context.drawImage(image, 0, 0, sampleSize, sampleSize);
                        const { data } = context.getImageData(0, 0, sampleSize, sampleSize);

                        for (let index = 0; index < data.length; index += 4) {
                            const alpha = data[index + 3];
                            if (alpha < 180) continue;

                            const color = [data[index], data[index + 1], data[index + 2]];
                            const { s, l } = rgbToHsl(color);
                            const baseWeight = alpha / 255;

                            average[0] += color[0] * baseWeight;
                            average[1] += color[1] * baseWeight;
                            average[2] += color[2] * baseWeight;
                            averageWeight += baseWeight;

                            const vibrancy = Math.max(0, s - 0.12) * (1 - Math.abs(l - 0.55));
                            if (vibrancy > 0) {
                                vibrant[0] += color[0] * vibrancy;
                                vibrant[1] += color[1] * vibrancy;
                                vibrant[2] += color[2] * vibrancy;
                                vibrantWeight += vibrancy;
                            }
                        }
                    } catch (error) {}
                });

                if (!averageWeight) {
                    return DEFAULT_CARD_THEME;
                }

                const averageColor = average.map((channel) => channel / averageWeight);
                const primaryColor = vibrantWeight
                    ? vibrant.map((channel) => channel / vibrantWeight)
                    : averageColor;

                return {
                    primary: primaryColor.map(clampChannel),
                    secondary: mixColors(primaryColor, [255, 255, 255], 0.84),
                    accent: mixColors(averageColor, [255, 255, 255], 0.62)
                };
            }

            function applyThemeToCard(card, theme) {
                card.style.setProperty('--tile-primary-rgb', rgbToCss(theme.primary));
                card.style.setProperty('--tile-secondary-rgb', rgbToCss(theme.secondary));
                card.style.setProperty('--tile-accent-rgb', rgbToCss(theme.accent));
            }

            function themeCardsFromPreviews() {
                document.querySelectorAll('.nav-card').forEach((card) => {
                    const images = [...card.querySelectorAll('.card-preview img')];
                    if (images.length === 0) return;

                    const applyTheme = () => {
                        const loadedImages = images.filter((image) => image.complete && image.naturalWidth > 0);
                        if (loadedImages.length === images.length) {
                            applyThemeToCard(card, extractThemeFromImages(loadedImages));
                        }
                    };

                    images.forEach((image) => {
                        image.addEventListener('load', applyTheme, { once: true });
                        image.addEventListener('error', applyTheme, { once: true });
                    });

                    applyTheme();
                });
            }

            document.addEventListener('DOMContentLoaded', themeCardsFromPreviews);
        })();
    </script>
    <script>
        (function() {
            const toggle = document.querySelector('.theme-toggle');
            const media = window.matchMedia('(prefers-color-scheme: dark)');

            function currentTheme() {
                return document.documentElement.dataset.theme || (media.matches ? 'dark' : 'light');
            }

            function updateToggle() {
                toggle.setAttribute('aria-pressed', currentTheme() === 'dark' ? 'true' : 'false');
            }

            toggle.addEventListener('click', function() {
                const nextTheme = currentTheme() === 'dark' ? 'light' : 'dark';
                document.documentElement.dataset.theme = nextTheme;
                try {
                    localStorage.setItem('theme', nextTheme);
                } catch (error) {}
                updateToggle();
            });

            media.addEventListener('change', function() {
                if (!document.documentElement.dataset.theme) {
                    updateToggle();
                }
            });

            updateToggle();
        })();
    </script>
